version: '3.1'
services:
  mosquitto:
    image: eclipse-mosquitto
    hostname: mosquitto
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    networks:
      - iot2
  influxdb:
    image: influxdb:1.8
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: iotdb
      INFLUXDB_ADMIN_USER: admin
      INFLUXDB_ADMIN_PASSWORD: admin12345
      INFLUXDB_USER: user
      INFLUXDB_USER_PASSWORD: userpass
    volumes:
      - ./influxdb-data:/var/lib/influxdb
    networks:
      - iot2
  grafana:
    image: grafana/grafana-enterprise:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - '3000:3000'
    networks:   
      - iot2
  
networks:
  iot2:
    driver: bridge
